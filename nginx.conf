server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Güvenlik: sunucu versiyonunu gizle
    server_tokens off;

    # ---------------------------------------------------------
    # Temiz URL yapısı
    # ---------------------------------------------------------
    # Not: Aşağıdaki yönlendirme kontrolleri $uri değil, $request_uri
    # (istemcinin gönderdiği ham istek) üzerinden yapılır. Bunun nedeni:
    # "index index.html;" direktifi "/" isteğini içeride "/index.html"e
    # çevirip location eşleştirmesini tekrar çalıştırır; eğer kontrol
    # $uri üzerinden yapılırsa bu dahili yönlendirme yanlışlıkla
    # "/index.html -> /" kuralını tetikleyip sonsuz/])yanlış 301 üretir.
    # $request_uri bu dahili yeniden yazımlardan etkilenmediği için
    # güvenlidir.

    # Statik dosyalar (css/js/assets) - doğrudan servis edilir, sıkıştırılır
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|webp|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # Sayfa istekleri: /about -> about.html, /services -> services.html,
    # / -> index.html (index direktifi ile), aksi halde 404
    location / {
        # /index.html -> / adresine kalıcı yönlendirme
        if ($request_uri ~* ^/index\.html(\?.*)?$) {
            return 301 /$1;
        }

        # /about.html, /services.html, /contact.html gibi istekleri
        # uzantısız halleriyle kalıcı olarak yönlendir (SEO / tekilleştirme)
        if ($request_uri ~* ^/(.+)\.html(\?.*)?$) {
            return 301 /$1$2;
        }

        try_files $uri $uri.html $uri/ =404;
    }

    # 404 sayfası olarak ana sayfayı göster (basit statik site için)
    error_page 404 /;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 512;
}
